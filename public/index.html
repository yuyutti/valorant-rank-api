<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALORANT Rank Search</title>
    <!-- GOOGLE_ANALYTICS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <style>
        :root {
            --valorant-red: #ff4655;
            --valorant-dark: #0f1923;
            --valorant-panel: rgba(15, 25, 35, 0.88);
            --valorant-border: rgba(255, 255, 255, 0.14);
            --valorant-muted: #9da8b4;
            --valorant-text: #f4f7f9;
            --valorant-teal: #64f5d2;
            --result-panel-height: 378px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
            color: var(--valorant-text);
            background:
                linear-gradient(135deg, rgba(15, 25, 35, 0.95), rgba(15, 25, 35, 0.8)),
                radial-gradient(circle at 16% 18%, rgba(255, 70, 85, 0.34), transparent 28%),
                radial-gradient(circle at 88% 12%, rgba(100, 245, 210, 0.16), transparent 26%),
                #0f1923;
        }

        .app-shell {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0;
        }

        .top-bar {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--valorant-border);
            padding-bottom: 18px;
        }

        .brand-mark {
            color: var(--valorant-red);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0;
            margin-bottom: 6px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 4.2rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .top-copy {
            max-width: 330px;
            margin: 0;
            color: var(--valorant-muted);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .search-box {
            background: var(--valorant-panel);
            border: 1px solid var(--valorant-border);
            border-left: 4px solid var(--valorant-red);
            padding: 18px;
            margin-bottom: 22px;
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
        }

        .search-form {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(120px, 0.5fr) 170px;
            gap: 12px;
        }

        .form-control {
            min-height: 52px;
            color: var(--valorant-text);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--valorant-border);
            border-radius: 2px;
        }

        .form-control::placeholder {
            color: rgba(244, 247, 249, 0.54);
        }

        .form-control:focus {
            color: var(--valorant-text);
            background: rgba(255, 255, 255, 0.09);
            border-color: var(--valorant-red);
            box-shadow: 0 0 0 0.2rem rgba(255, 70, 85, 0.18);
        }

        .action-button {
            min-height: 52px;
            border: 0;
            border-radius: 2px;
            background: var(--valorant-red);
            color: #fff;
            font-weight: 800;
            transition: transform 140ms ease, background 140ms ease;
        }

        .action-button:hover {
            transform: translateY(-1px);
            background: #ff5c68;
        }

        .action-button.copy-mode {
            background: var(--valorant-teal);
            color: var(--valorant-dark);
        }

        .status-line {
            min-height: 24px;
            margin-top: 12px;
            color: var(--valorant-muted);
            font-size: 0.92rem;
        }

        .status-line.error {
            color: #ff9aa3;
        }

        .status-line.success {
            color: var(--valorant-teal);
        }

        .player-info {
            display: grid;
            grid-template-columns: minmax(260px, 0.95fr) minmax(0, 1.05fr);
            gap: 20px;
            align-items: stretch;
        }

        .media-panel,
        .data-panel {
            background: var(--valorant-panel);
            border: 1px solid var(--valorant-border);
            overflow: hidden;
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.26);
            min-height: var(--result-panel-height);
        }

        .player-card {
            height: 100%;
            min-height: var(--result-panel-height);
            background:
                linear-gradient(180deg, transparent 60%, rgba(15, 25, 35, 0.92)),
                url("/img/main") center / cover no-repeat;
        }

        .player-card img {
            width: 100%;
            height: 100%;
            min-height: var(--result-panel-height);
            object-fit: cover;
            display: block;
        }

        .data-panel {
            display: flex;
            padding: 24px;
            position: relative;
        }

        .data-panel::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 42%;
            height: 4px;
            background: var(--valorant-red);
        }

        .empty-state {
            display: grid;
            width: 100%;
            place-items: center;
            color: var(--valorant-muted);
            text-align: center;
            line-height: 1.7;
        }

        .result-content {
            width: 100%;
            align-self: center;
        }

        .player-details {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 24px;
        }

        .player-details h2 {
            margin: 0;
            font-size: clamp(1.35rem, 2.4vw, 2rem);
            font-weight: 900;
            line-height: 1.15;
            word-break: break-word;
        }

        .tagline {
            color: var(--valorant-red);
            font-size: 0.98rem;
            font-weight: 800;
        }

        .rank-display {
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr);
            gap: 18px;
            align-items: center;
            margin-bottom: 24px;
        }

        .rank-icon-wrap {
            display: grid;
            width: 96px;
            height: 96px;
            place-items: center;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--valorant-border);
        }

        .rank-icon {
            width: 76px;
            height: 76px;
            object-fit: contain;
        }

        .rank-name {
            margin: 0 0 12px;
            font-size: 1.7rem;
            font-weight: 900;
        }

        .progress {
            height: 16px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 0;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--valorant-red), var(--valorant-teal));
        }

        .rank-points {
            margin-top: 8px;
            color: var(--valorant-muted);
            font-size: 0.92rem;
        }

        .player-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .stat {
            min-height: 78px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--valorant-border);
        }

        .stat strong {
            display: block;
            margin-bottom: 6px;
            color: var(--valorant-muted);
            font-size: 0.78rem;
            font-weight: 800;
        }

        .stat span {
            font-size: 1.25rem;
            font-weight: 900;
            word-break: break-word;
        }

        .site-footer {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid var(--valorant-border);
            color: var(--valorant-muted);
            font-size: 0.86rem;
        }

        .site-footer a {
            color: var(--valorant-teal);
            text-decoration: none;
            font-weight: 700;
        }

        .site-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 760px) {
            .app-shell {
                width: min(100% - 24px, 1080px);
                padding: 20px 0;
            }

            .top-bar {
                align-items: start;
                flex-direction: column;
            }

            .search-form,
            .player-info {
                grid-template-columns: 1fr;
            }

            .player-stats {
                grid-template-columns: 1fr;
            }

            .rank-display {
                grid-template-columns: 78px minmax(0, 1fr);
            }

            .rank-icon-wrap {
                width: 78px;
                height: 78px;
            }

            .rank-icon {
                width: 62px;
                height: 62px;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <header class="top-bar">
            <div>
                <div class="brand-mark">VALORANT RANK API</div>
                <h1>Rank Search</h1>
            </div>
            <p class="top-copy">Riot IDから現在のランク、RR、直近のMMR変動を見やすく表示します。</p>
        </header>

        <section class="search-box" aria-label="プレイヤー検索">
            <form id="searchForm" class="search-form">
                <input type="text" class="form-control" placeholder="プレイヤー名" id="nameInput" autocomplete="off" required>
                <input type="text" class="form-control" placeholder="タグライン" id="taglineInput" autocomplete="off" required>
                <button class="action-button" id="submitButton" type="submit">検索</button>
            </form>
            <div class="status-line" id="statusMessage">プレイヤー名とタグラインを入力してください。</div>
        </section>

        <section class="player-info" id="playerInfo" aria-live="polite">
            <div class="media-panel">
                <div class="player-card" id="playerCard">
                    <img src="/img/main" alt="Player Card" id="playerCardImage">
                </div>
            </div>

            <div class="data-panel">
                <div class="empty-state" id="emptyState">
                    検索結果はここに表示されます。
                </div>

                <div class="result-content" id="resultContent" style="display:none;">
                    <div class="player-details">
                        <h2 id="playerName">name</h2>
                        <span class="tagline" id="playerTagline">#tag</span>
                    </div>

                    <div class="rank-display">
                        <div class="rank-icon-wrap">
                            <img src="/img/rank/1" alt="Rank Icon" class="rank-icon" id="rankIcon">
                        </div>
                        <div>
                            <h3 class="rank-name" id="displayRankName">アンランク</h3>
                            <div class="progress">
                                <div class="progress-bar" role="progressbar" id="rankProgressBar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                            <div class="rank-points" id="rankPoints">0/100 RR</div>
                        </div>
                    </div>

                    <div class="player-stats">
                        <div class="stat"><strong>レベル</strong><span id="playerLevel">0</span></div>
                        <div class="stat"><strong>MMR変動</strong><span id="mmrChange">0</span></div>
                        <div class="stat"><strong>トータルELO</strong><span id="totalPoints">0</span></div>
                        <div class="stat"><strong>リージョン</strong><span id="shard">不明</span></div>
                    </div>
                </div>
            </div>
        </section>

        <footer class="site-footer">
            <a href="/privacy">プライバシーポリシー</a>
        </footer>
    </main>

    <script>
        const searchForm = document.getElementById('searchForm');
        const nameInput = document.getElementById('nameInput');
        const taglineInput = document.getElementById('taglineInput');
        const submitButton = document.getElementById('submitButton');
        const statusMessage = document.getElementById('statusMessage');
        const emptyState = document.getElementById('emptyState');
        const resultContent = document.getElementById('resultContent');

        let lastSearch = null;
        let currentShareUrl = '';

        function getInputValues() {
            return {
                name: nameInput.value.trim(),
                tagline: taglineInput.value.trim(),
            };
        }

        function isSameAsLastSearch() {
            const values = getInputValues();

            return Boolean(lastSearch && values.name === lastSearch.name && values.tagline === lastSearch.tagline);
        }

        function updateSubmitMode() {
            const isCopyMode = isSameAsLastSearch();

            submitButton.textContent = isCopyMode ? 'リンクをコピー' : '検索';
            submitButton.classList.toggle('copy-mode', isCopyMode);
        }

        function setStatus(message, type = '') {
            statusMessage.textContent = message;
            statusMessage.className = `status-line ${type}`.trim();
        }

        function setResultVisible(isVisible) {
            emptyState.style.display = isVisible ? 'none' : 'grid';
            resultContent.style.display = isVisible ? 'block' : 'none';
        }

        function getRegionName(region) {
            switch (region) {
                case 'na':
                    return '北アメリカ';
                case 'pbe':
                    return '北アメリカ (PBE)';
                case 'eu':
                    return 'ヨーロッパ';
                case 'ap':
                    return 'アジア';
                case 'kr':
                    return '韓国';
                default:
                    return region || '不明';
            }
        }

        function buildShareUrl(name, tagline) {
            const url = new URL(window.location.href);

            url.searchParams.set('name', name);
            url.searchParams.set('tagline', tagline);

            return url.toString();
        }

        function copyTextFallback(text) {
            const textarea = document.createElement('textarea');

            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.top = '-1000px';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        }

        async function copyShareUrl() {
            try {
                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(currentShareUrl);
                } else {
                    copyTextFallback(currentShareUrl);
                }

                setStatus('リンクをコピーしました。', 'success');
            } catch (error) {
                try {
                    copyTextFallback(currentShareUrl);
                    setStatus('リンクをコピーしました。', 'success');
                } catch (fallbackError) {
                    setStatus('コピーに失敗しました。ブラウザの権限を確認してください。', 'error');
                    console.error('Error copying link:', fallbackError);
                }
            }
        }

        function renderPlayer(data, fallbackName, fallbackTagline) {
            const rankName = data.currentRank?.ja || 'アンランク';
            const rankIcon = data.currentRankImgSrc || '/img/rank/1';
            const points = Math.max(0, Math.min(100, Number(data.points) || 0));

            setResultVisible(true);
            document.getElementById('playerName').textContent = data.gameName || fallbackName;
            document.getElementById('playerTagline').textContent = `#${data.tagLine || fallbackTagline}`;
            document.getElementById('playerCardImage').src = data.card?.small || '/img/main';
            document.getElementById('playerLevel').textContent = data.account_level || 0;
            document.getElementById('displayRankName').textContent = rankName;
            document.getElementById('rankIcon').src = rankIcon;

            const progressBar = document.getElementById('rankProgressBar');
            progressBar.style.width = `${points}%`;
            progressBar.setAttribute('aria-valuenow', points);
            document.getElementById('rankPoints').textContent = `${points}/100 RR`;
            document.getElementById('mmrChange').textContent = data.mmr_change_to_last_game || 0;
            document.getElementById('totalPoints').textContent = data.totalPoints || 0;
            document.getElementById('shard').textContent = getRegionName(data.shared);
        }

        async function searchPlayer(name, tagline) {
            setStatus('取得中...');
            setResultVisible(false);
            submitButton.disabled = true;

            try {
                const response = await fetch(`/api/info/${encodeURIComponent(name)}/${encodeURIComponent(tagline)}`);
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                renderPlayer(data, name, tagline);
                lastSearch = { name, tagline };
                currentShareUrl = buildShareUrl(name, tagline);
                setStatus('検索結果を表示しました。', 'success');
            } catch (error) {
                lastSearch = null;
                currentShareUrl = '';
                setStatus(`取得に失敗しました: ${error.message}`, 'error');
                setResultVisible(false);
                console.error('Error fetching player info:', error);
            } finally {
                submitButton.disabled = false;
                updateSubmitMode();
            }
        }

        searchForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const { name, tagline } = getInputValues();

            if (!name || !tagline) {
                setStatus('プレイヤー名とタグラインを入力してください。', 'error');
                return;
            }

            if (isSameAsLastSearch()) {
                copyShareUrl();
                return;
            }

            searchPlayer(name, tagline);
        });

        [nameInput, taglineInput].forEach((input) => {
            input.addEventListener('input', () => {
                updateSubmitMode();

                if (!isSameAsLastSearch()) {
                    setStatus('入力が変更されました。検索すると結果を更新します。');
                }
            });
        });

        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        const tagline = urlParams.get('tagline');

        if (name && tagline) {
            nameInput.value = name;
            taglineInput.value = tagline;
            searchPlayer(name, tagline);
        }
    </script>
</body>
</html>
